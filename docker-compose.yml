name: autoflow-api
services:
    application:
        container_name: autoflow-api
        restart: unless-stopped
        build:
            context: ./
            args:
                UID: "${UID:-1000}"
                GID: "${GID:-1000}"
        volumes:
            - ./:/var/www
            - "autoflow_phpsocket:/var/run/php"         # socket do php-fpm
        networks:
            - autoflow-network
        depends_on:
            mysql:
               condition: service_healthy
            redis:
                condition: service_started

    nginx:
        container_name: autoflow-nginx
        restart: unless-stopped
        build:
            context: ./.docker/nginx
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www:ro # read-only

            # nginx pools configuration
            - ./.docker/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./.docker/nginx/conf/autoflow.conf.template:/etc/nginx/conf.d/autoflow.conf.template:ro

            - "autoflow_phpsocket:/var/run/php"   # para acessar /var/run/php/php-fpm.sock
        ports:
            - "8002:80" # http (acesso direto opcional)
            # - "8443:443" # https
        networks:
            autoflow-network: {}
            autoflow-proxy:
                # Permite que outros containers (ex.: n8n) alcancem a API por nome,
                # sobre HTTP interno, sem passar pelo Traefik. O Host bate com o vhost.
                aliases:
                    - api.app.local
        depends_on:
            - application
        environment:
            SERVER_NAME: ${SERVER_NAME}
            ROOT_PATH: ${ROOT_PATH}
        labels:
            - traefik.enable=true
            - traefik.docker.network=autoflow-proxy
            - traefik.http.routers.autoflow-api.rule=Host(`api.app.local`)
            - traefik.http.routers.autoflow-api.entrypoints=websecure
            - traefik.http.routers.autoflow-api.tls=true
            - traefik.http.services.autoflow-api.loadbalancer.server.port=80

    mysql:
       container_name: autoflow-mysql
       image: mysql:8.4
       restart: always
       volumes:
           - autoflow_mysql_data:/var/lib/mysql
       env_file:
           - ./.docker/mysql/mysql.env
       healthcheck:
           test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
           interval: 30s
           timeout: 10s
           retries: 5
           start_period: 60s
       ports:
           - "3307:3306"
       networks:
           - autoflow-network

    redis:
        container_name: autoflow-redis
        restart: unless-stopped
        image: redis:8.2.4-alpine
        volumes:
            - autoflow_redis_data:/data
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
            - "6380:6379"
        networks:
            - autoflow-network

volumes:
    autoflow_mysql_data:
       name: autoflow_mysql_data
       driver: local
    autoflow_redis_data:
        name: autoflow_redis_data
        driver: local
    autoflow_phpsocket:
        name: autoflow_phpsocket
        driver: local

networks:
  autoflow-network:
        name: autoflow-network
        driver: bridge
  autoflow-proxy:
        external: true
        name: autoflow-proxy
